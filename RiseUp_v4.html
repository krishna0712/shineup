<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no"/>
<title>Rise Up</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;display:flex;align-items:center;justify-content:center;height:100vh;overflow:hidden;touch-action:none}
canvas{display:block}
</style>
</head>
<body>
<script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
<script>
'use strict';

// ═══════════════════════════════════════════════════════════
//  CONSTANTS
// ═══════════════════════════════════════════════════════════
const W = 400, H = 700;
const MAX_LEVEL = 100;

// ── 10 Themes, one per decade of levels ─────────────────────
const THEMES = [
  { name:'Daytime Sky',   sky1:0x5aa0d0, sky2:0x2266aa, stars:0.0,  clouds:0.30, blockT:0x4488cc, wallT:0x2255aa, triT:0xdd5522, barT:0x3366bb, light:0xffffff, spd:1.00, den:0 },
  { name:'Sunset',        sky1:0xdd6622, sky2:0xaa2233, stars:0.15, clouds:0.20, blockT:0xcc4411, wallT:0xaa2200, triT:0xff8833, barT:0xdd5522, light:0xff9966, spd:1.10, den:0 },
  { name:'Dusk',          sky1:0x440055, sky2:0x220033, stars:0.35, clouds:0.12, blockT:0x8833cc, wallT:0x6622aa, triT:0xcc44ff, barT:0x9933dd, light:0xaa66ff, spd:1.20, den:1 },
  { name:'Night Sky',     sky1:0x060618, sky2:0x0a0a28, stars:0.75, clouds:0.05, blockT:0x3344aa, wallT:0x2233cc, triT:0x4466ff, barT:0x3355bb, light:0x6688ff, spd:1.30, den:1 },
  { name:'Aurora',        sky1:0x003320, sky2:0x001a0f, stars:0.55, clouds:0.10, blockT:0x00cc88, wallT:0x009966, triT:0x44ffaa, barT:0x00bb77, light:0x44ffaa, spd:1.45, den:2 },
  { name:'Deep Space',    sky1:0x020210, sky2:0x050518, stars:0.90, clouds:0.02, blockT:0x6644aa, wallT:0x4422cc, triT:0xaa66ff, barT:0x8855dd, light:0x8866ff, spd:1.60, den:2 },
  { name:'Nebula',        sky1:0x1a0030, sky2:0x300010, stars:0.80, clouds:0.18, blockT:0xff3388, wallT:0xcc1155, triT:0xff66aa, barT:0xee4499, light:0xff66bb, spd:1.75, den:3 },
  { name:'Asteroid Belt', sky1:0x111100, sky2:0x221100, stars:0.60, clouds:0.04, blockT:0xaa8833, wallT:0x886622, triT:0xddbb44, barT:0xcc9933, light:0xddbb44, spd:1.90, den:3 },
  { name:'Solar Storm',   sky1:0x330800, sky2:0x660f00, stars:0.40, clouds:0.07, blockT:0xff4400, wallT:0xcc2200, triT:0xff8833, barT:0xee5511, light:0xff6622, spd:2.10, den:4 },
  { name:'Event Horizon', sky1:0x000000, sky2:0x080005, stars:1.00, clouds:0.00, blockT:0xeeeeee, wallT:0xcccccc, triT:0xff00ff, barT:0xcc00cc, light:0xff00ff, spd:2.40, den:5 },
];

function getLevelConfig(lvl) {
  const tIdx  = Math.min(9, Math.floor((lvl - 1) / 10));
  const theme = THEMES[tIdx];
  const targetAlt = 300 + (lvl - 1) * 47;

  const patterns = ['fallingBlocks'];
  if (lvl >= 3)  patterns.push('theTunnel');
  if (lvl >= 6)  patterns.push('theWall');
  if (lvl >= 10) patterns.push('thePendulum');
  if (lvl >= 15) patterns.push('theShredder');
  if (lvl >= 20) patterns.push('spikeDrop');
  if (lvl >= 30) patterns.push('spikeRain');
  if (lvl >= 40) patterns.push('theGauntlet');
  if (lvl >= 55) patterns.push('crossfire');
  if (lvl >= 70) patterns.push('vortex');
  if (lvl >= 85) patterns.push('apocalypse');

  const diff    = 1.0 + (lvl - 1) * 0.035 + (theme.spd - 1.0);
  const density = Math.min(8, 2 + Math.floor((lvl - 1) / 12)) + theme.den;
  return { lvl, targetAlt, theme, tIdx, patterns, diff, density };
}

// ═══════════════════════════════════════════════════════════
//  STORAGE
// ═══════════════════════════════════════════════════════════
const Store = {
  _r(k, d) { try { const v = localStorage.getItem('ru4_' + k); return v !== null ? JSON.parse(v) : d; } catch { return d; } },
  _w(k, v) { try { localStorage.setItem('ru4_' + k, JSON.stringify(v)); } catch {} },
  getHS()          { return this._r('hs', 0); },
  saveHS(s)        { if (s > this.getHS()) { this._w('hs', s); return true; } return false; },
  getMaxLvl()      { return this._r('ml', 1); },
  saveMaxLvl(l)    { if (l > this.getMaxLvl()) this._w('ml', l); },
  getLvlStars(l)   { return this._r('st' + l, 0); },
  saveLvlStars(l,s){ if (s > this.getLvlStars(l)) this._w('st' + l, s); },
  getCoins()       { return this._r('coins', 0); },
  addCoins(n)      { this._w('coins', this.getCoins() + n); },
  getRuns()        { return this._r('runs', 0); },
  incRuns()        { this._w('runs', this.getRuns() + 1); },
};

// ═══════════════════════════════════════════════════════════
//  TEXTURE BUILDER  — pure canvas, no external assets needed
// ═══════════════════════════════════════════════════════════
function buildTextures(scene) {
  const G = (w, h) => { const g = scene.make.graphics({ add: false }); g._W = w; g._H = h; return g; };
  const F = (g, k)  => { g.generateTexture(k, g._W, g._H); g.destroy(); };

  // Balloon
  { const g = G(60, 88), cx = 30, cy = 30, r = 27;
    g.fillStyle(0xff2244, 1); g.fillCircle(cx, cy, r);
    g.fillStyle(0xff5577, 1); g.fillCircle(cx - 7, cy - 7, r * 0.5);
    g.fillStyle(0xffffff, 0.2); g.fillCircle(cx - 11, cy - 11, r * 0.3);
    g.fillStyle(0xcc1133, 1); g.fillEllipse(cx, cy + r + 1, 10, 7);
    g.lineStyle(1.5, 0xffaacc, 0.9);
    g.beginPath(); g.moveTo(cx, cy + r + 4); g.lineTo(cx - 4, cy + r + 22); g.strokePath();
    F(g, 'balloon'); }

  // Shield
  { const g = G(40, 40), cx = 20, cy = 20, r = 18;
    g.fillStyle(0x4fffb0, 0.07); g.fillCircle(cx, cy, r);
    g.lineStyle(2, 0x4fffb0, 1.0); g.strokeCircle(cx, cy, r - 1);
    g.lineStyle(1.5, 0x4fffb0, 0.45); g.strokeCircle(cx, cy, r - 4);
    g.lineStyle(1, 0x4fffb0, 0.28);
    g.beginPath(); g.moveTo(cx, cy - r + 3); g.lineTo(cx, cy + r - 3);
    g.moveTo(cx - r + 3, cy); g.lineTo(cx + r - 3, cy); g.strokePath();
    F(g, 'shield'); }

  // Block
  { const g = G(60, 26);
    g.fillStyle(0x1e3050, 1); g.fillRect(0, 0, 60, 26);
    g.lineStyle(2, 0x4477aa, 1); g.strokeRect(1, 1, 58, 24);
    g.fillStyle(0x4477aa, 1); [10, 30, 50].forEach(x => g.fillCircle(x, 13, 3));
    F(g, 'block'); }

  // Block wide
  { const g = G(50, 26);
    g.fillStyle(0x1e3050, 1); g.fillRect(0, 0, 50, 26);
    g.lineStyle(2, 0x4477aa, 1); g.strokeRect(1, 1, 48, 24);
    g.fillStyle(0x4477aa, 1); [10, 25, 40].forEach(x => g.fillCircle(x, 13, 3));
    F(g, 'block_wide'); }

  // Circle Obstacle
  { const g = G(36, 36);
    g.fillStyle(0xcc4455, 1); g.fillCircle(18, 18, 18);
    g.lineStyle(2, 0xff6677, 1); g.strokeCircle(18, 18, 16);
    F(g, 'circle'); }

  // Cross Obstacle
  { const g = G(40, 40);
    g.fillStyle(0x33aa55, 1); g.fillRect(12, 0, 16, 40); g.fillRect(0, 12, 40, 16);
    g.lineStyle(2, 0x55cc77, 1); g.strokeRect(13, 1, 14, 38); g.strokeRect(1, 13, 38, 14);
    F(g, 'cross'); }

  // Diamond Obstacle
  { const g = G(36, 36);
    g.fillStyle(0xdd8822, 1);
    g.beginPath(); g.moveTo(18,0); g.lineTo(36,18); g.lineTo(18,36); g.lineTo(0,18); g.closePath(); g.fill();
    g.lineStyle(2, 0xffaa44, 1); g.strokePath();
    F(g, 'diamond'); }

  // Wall
  { const g = G(44, 130);
    g.fillStyle(0x2a3f66, 1); g.fillRect(0, 0, 44, 130);
    g.lineStyle(2, 0x4a6fa0, 1); g.strokeRect(1, 1, 42, 128);
    g.lineStyle(1, 0x4a6fa0, 0.3);
    for (let y = 20; y < 130; y += 20) { g.beginPath(); g.moveTo(0, y); g.lineTo(44, y); g.strokePath(); }
    g.fillStyle(0x4a6fa0, 0.8); [[8,10],[36,10],[8,120],[36,120]].forEach(([x,y]) => g.fillCircle(x, y, 4));
    F(g, 'wall'); }

  // Triangle
  { const g = G(64, 64);
    g.fillStyle(0x8b2fc9, 1); g.fillTriangle(32, 2, 62, 62, 2, 62);
    g.lineStyle(2, 0xcc66ff, 1); g.strokeTriangle(32, 2, 62, 62, 2, 62);
    g.lineStyle(1, 0xcc66ff, 0.4); g.strokeTriangle(32, 14, 52, 54, 12, 54);
    F(g, 'triangle'); }

  // Pendulum bar
  { const g = G(140, 20);
    g.fillStyle(0x3a5580, 1); g.fillRect(0, 0, 140, 20);
    g.lineStyle(2, 0x6699cc, 1); g.strokeRect(1, 1, 138, 18);
    g.fillStyle(0x6699cc, 1); [8, 70, 132].forEach(x => g.fillCircle(x, 10, 4));
    F(g, 'bar'); }

  // Spike
  { const g = G(16, 34);
    g.fillStyle(0xcc3300, 1); g.fillTriangle(8, 0, 16, 34, 0, 34);
    g.lineStyle(1, 0xff6633, 1); g.strokeTriangle(8, 0, 16, 34, 0, 34);
    F(g, 'spike'); }

  // Powerups
  { const g = G(32, 32), cx = 16, cy = 16;
    g.fillStyle(0xffaa00, 0.2); g.fillCircle(cx, cy, 15);
    g.lineStyle(2, 0xffaa00, 1); g.strokeCircle(cx, cy, 14);
    g.fillStyle(0xffaa00, 1);
    g.fillTriangle(cx, cy-9, cx+3, cy-2, cx-3, cy-2);
    g.fillTriangle(cx, cy+9, cx+3, cy+2, cx-3, cy+2);
    g.fillTriangle(cx-9, cy, cx-2, cy-3, cx-2, cy+3);
    g.fillTriangle(cx+9, cy, cx+2, cy-3, cx+2, cy+3);
    F(g, 'pu_shield'); }
  { const g = G(32, 32), cx = 16, cy = 16;
    g.fillStyle(0x44aaff, 0.2); g.fillCircle(cx, cy, 15);
    g.lineStyle(2, 0x44aaff, 1); g.strokeCircle(cx, cy, 14);
    g.lineStyle(2, 0x44aaff, 1);
    g.beginPath(); g.moveTo(cx, cy); g.lineTo(cx, cy - 8); g.strokePath();
    g.beginPath(); g.moveTo(cx, cy); g.lineTo(cx + 6, cy + 3); g.strokePath();
    g.fillStyle(0x44aaff, 1); g.fillCircle(cx, cy, 2);
    F(g, 'pu_slow'); }
  { const g = G(32, 32), cx = 16, cy = 16;
    g.fillStyle(0xff66ff, 0.2); g.fillCircle(cx, cy, 15);
    g.lineStyle(2, 0xff66ff, 1); g.strokeCircle(cx, cy, 14);
    g.fillStyle(0xff66ff, 1);
    g.fillTriangle(cx, cy - 10, cx + 8, cy, cx, cy + 10);
    g.fillTriangle(cx, cy - 10, cx - 8, cy, cx, cy + 10);
    F(g, 'pu_ghost'); }

  // Coin & Particles
  { const g = G(24, 24), cx = 12, cy = 12;
    g.fillStyle(0xffcc00, 1); g.fillCircle(cx, cy, 11);
    g.fillStyle(0xffaa00, 1); g.fillCircle(cx, cy, 9);
    g.fillStyle(0xffee66, 0.6); g.fillCircle(cx - 3, cy - 3, 4);
    F(g, 'coin'); }
  { const g = G(8, 8); g.fillStyle(0xffffff, 1); g.fillCircle(4, 4, 4); F(g, 'spark'); }
  { const g = G(40, 3); g.fillStyle(0xffffff, 1); g.fillRect(0, 0, 40, 3); F(g, 'streak'); }
  { const g = G(6, 6);  g.fillStyle(0xffdd44, 1); g.fillCircle(3, 3, 3); F(g, 'glitter'); }
  { const g = G(3, 3); g.fillStyle(0xffffff, 1); g.fillRect(0, 0, 3, 3); F(g, 'star'); }
  { const g = G(60, 40);
    g.fillStyle(0xffffff, 0.55); g.fillEllipse(30, 26, 56, 30);
    g.fillStyle(0xffffff, 0.55); g.fillEllipse(20, 20, 34, 24);
    g.fillStyle(0xffffff, 0.55); g.fillEllipse(42, 18, 30, 22);
    F(g, 'cloud'); }
  { const g = G(1, 1); g.fillStyle(0xffffff, 1); g.fillRect(0, 0, 1, 1); F(g, 'px'); }
}

function gradBg(scene, c1, c2) {
  const top = scene.add.rectangle(W / 2, H / 4, W, H / 2, c1).setDepth(-10);
  const bot = scene.add.rectangle(W / 2, H * 3 / 4, W, H / 2, c2).setDepth(-10);
  return [top, bot];
}

// ═══════════════════════════════════════════════════════════
//  BOOT
// ═══════════════════════════════════════════════════════════
class BootScene extends Phaser.Scene {
  constructor() { super({ key: 'Boot' }); }
  preload() {
    const bar = this.add.rectangle(W / 2, H / 2, 0, 6, 0x4fffb0);
    this.load.on('progress', v => { bar.width = W * v; });
  }
  create() { buildTextures(this); this.scene.start('Menu'); }
}

// ═══════════════════════════════════════════════════════════
//  MENU
// ═══════════════════════════════════════════════════════════
class MenuScene extends Phaser.Scene {
  constructor() { super({ key: 'Menu' }); }

  create() {
    const bg = this.add.graphics();
    // Lighter, softer navy theme background
    bg.fillStyle(0x161b33, 1); bg.fillRect(0, 0, W, H / 2);
    bg.fillStyle(0x222a4a, 1); bg.fillRect(0, H / 2, W, H / 2);

    for (let i = 0; i < 130; i++) {
      const s = this.add.image(
        Phaser.Math.Between(0, W), Phaser.Math.Between(0, H), 'star'
      ).setAlpha(Math.random() * 0.7 + 0.1).setScale(Math.random() * 2 + 0.5);
      this.tweens.add({ targets: s, alpha: 0.05, yoyo: true, repeat: -1,
        duration: Phaser.Math.Between(1000, 4000), delay: Phaser.Math.Between(0, 3000) });
    }

    for (let i = 0; i < 5; i++) {
      this.add.image(Phaser.Math.Between(-20, W + 20), Phaser.Math.Between(80, H - 80), 'cloud')
        .setAlpha(0.05 + Math.random() * 0.05).setScale(Phaser.Math.FloatBetween(2.5, 5));
    }

    const cx = W / 2;

    this.add.text(cx, 165, 'RISE UP', {
      fontFamily: 'Impact,Arial Black,sans-serif', fontSize: '80px',
      color: '#4fffb0', stroke: '#4fffb0', strokeThickness: 24
    }).setOrigin(0.5).setAlpha(0.12);

    const title = this.add.text(cx, 165, 'RISE UP', {
      fontFamily: 'Impact,Arial Black,sans-serif', fontSize: '80px',
      color: '#ffffff', stroke: '#0a3322', strokeThickness: 8
    }).setOrigin(0.5);
    this.tweens.add({ targets: title, y: 173, yoyo: true, repeat: -1, duration: 2200, ease: 'Sine.easeInOut' });

    this.add.text(cx, 232, '— Shield the balloon · Reach for the stars —', {
      fontFamily: 'Courier New,monospace', fontSize: '12px', color: '#8899aa'
    }).setOrigin(0.5);

    const stats = [
      ['🏆 ' + Store.getHS() + 'm', 'BEST SCORE'],
      ['⭐ Lvl ' + Store.getMaxLvl(), 'MAX LEVEL'],
      ['🪙 ' + Store.getCoins(), 'COINS']
    ];
    stats.forEach(([val, lbl], i) => {
      const bx = 70 + i * 130, by = 300;
      const g = this.add.graphics();
      g.lineStyle(1, 0x4fffb0, 0.4); g.strokeRect(bx - 55, by - 22, 110, 44);
      g.fillStyle(0x000000, 0.45); g.fillRect(bx - 55, by - 22, 110, 44);
      this.add.text(bx, by - 8, val, {
        fontFamily: 'Impact,Arial Black,sans-serif', fontSize: '17px',
        color: '#ffffff', stroke: '#000', strokeThickness: 3
      }).setOrigin(0.5);
      this.add.text(bx, by + 9, lbl, {
        fontFamily: 'Courier New,monospace', fontSize: '9px', color: '#99aabb'
      }).setOrigin(0.5);
    });

    this._modeBtn(cx, 430, '📋  LEVEL MODE', 'Levels 1–100  |  Story Progress', 0x4fffb0, () => {
      this.cameras.main.fade(280, 0, 0, 0);
      this.time.delayedCall(300, () => this.scene.start('LevelSelect'));
    });
    this._modeBtn(cx, 530, '∞  ENDLESS MODE', 'Survive · Score · Chase Records', 0xffaa00, () => {
      this.cameras.main.fade(280, 0, 0, 0);
      this.time.delayedCall(300, () => this.scene.start('Play', { mode: 'endless', level: 1 }));
    });

    this.add.text(cx, H - 16, 'Move mouse or touch to control the shield', {
      fontFamily: 'Courier New,monospace', fontSize: '11px', color: '#667788'
    }).setOrigin(0.5);

    this.cameras.main.fadeIn(500);
  }

  _modeBtn(x, y, title, sub, col, cb) {
    const g = this.add.graphics();
    const hex = '#' + col.toString(16).padStart(6, '0');
    g.fillStyle(0x000000, 0.50); g.fillRect(x - 160, y - 36, 320, 72);
    g.lineStyle(2, col, 0.80);   g.strokeRect(x - 160, y - 36, 320, 72);

    const t = this.add.text(x, y - 10, title, {
      fontFamily: 'Impact,Arial Black,sans-serif', fontSize: '28px',
      color: hex, stroke: '#000', strokeThickness: 5
    }).setOrigin(0.5);
    this.add.text(x, y + 16, sub, {
      fontFamily: 'Courier New,monospace', fontSize: '12px', color: '#8899aa'
    }).setOrigin(0.5);

    const zone = this.add.zone(x, y, 320, 72).setInteractive({ useHandCursor: true });
    zone.on('pointerover', () => { t.setScale(1.05); });
    zone.on('pointerout',  () => { t.setScale(1.0);  });
    zone.on('pointerdown', cb);
  }
}

// ═══════════════════════════════════════════════════════════
//  LEVEL SELECT
// ═══════════════════════════════════════════════════════════
// ═══════════════════════════════════════════════════════════
//  LEVEL SELECT
// ═══════════════════════════════════════════════════════════
class LevelSelectScene extends Phaser.Scene {
  constructor() { super({ key: 'LevelSelect' }); }

  create() {
    this._page = 0;
    
    // 1. Build the background FIRST so it stays at the bottom
    this._buildBg();
    
    // 2. Create the containers AFTER the background, and set depth just in case
    this._gridContainer = this.add.container(0, 0).setDepth(10);
    this._navContainer  = this.add.container(0, 0).setDepth(10);
    
    // 3. Build the rest of the UI on top
    this._buildHeader();
    this._buildGrid();
    this._buildNav();
    
    this.cameras.main.fadeIn(350);
  }

  _buildBg() {
    const bg = this.add.graphics();
    // Lighter, softer background for much better contrast
    bg.fillStyle(0x161b33, 1); bg.fillRect(0, 0, W, H / 2);
    bg.fillStyle(0x222a4a, 1); bg.fillRect(0, H / 2, W, H / 2);
    for (let i = 0; i < 80; i++) {
      this.add.image(Phaser.Math.Between(0, W), Phaser.Math.Between(0, H), 'star')
        .setAlpha(Math.random() * 0.4 + 0.1);
    }
  }

  _buildHeader() {
    this.add.text(W / 2, 28, 'SELECT LEVEL', {
      fontFamily: 'Impact,Arial Black,sans-serif', fontSize: '30px',
      color: '#4fffb0', stroke: '#002211', strokeThickness: 6
    }).setOrigin(0.5).setDepth(10);

    this._unlockLbl = this.add.text(W / 2, 57, 'Unlocked up to Level ' + Store.getMaxLvl(), {
      fontFamily: 'Courier New,monospace', fontSize: '12px', color: '#8899aa'
    }).setOrigin(0.5).setDepth(10);

    this._themeLbl = this.add.text(W / 2, H - 46, '', {
      fontFamily: 'Courier New,monospace', fontSize: '12px', color: '#aabbcc'
    }).setOrigin(0.5).setDepth(10);
  }

  _buildGrid() {
    this._gridContainer.removeAll(true);
    const maxUnlocked = Store.getMaxLvl();
    const cols = 5, bw = 64, bh = 54, gapX = 10, gapY = 10;
    const totalW = cols * bw + (cols - 1) * gapX;
    const startX = (W - totalW) / 2;
    const startY = 80;

    for (let row = 0; row < 2; row++) {
      for (let col = 0; col < cols; col++) {
        const idx = this._page * 10 + row * cols + col;
        const lvl = idx + 1;
        if (lvl > MAX_LEVEL) continue;

        const cfg     = getLevelConfig(lvl);
        const theme   = cfg.theme;
        const unlocked = lvl <= maxUnlocked;
        const stars   = Store.getLvlStars(lvl);
        const x = startX + col * (bw + gapX) + bw / 2;
        const y = startY + row * (bh + gapY) + bh / 2;

        const boxG = this.add.graphics();
        // Increased box opacity so colors show brightly
        const boxAlpha = unlocked ? 1.0 : 0.6;
        boxG.fillStyle(theme.sky1, boxAlpha);
        boxG.fillRect(x - bw / 2, y - bh / 2, bw, bh);
        
        const borderCol = unlocked ? theme.light : 0x445566;
        const borderAlpha = unlocked ? 1.0 : 0.5;
        boxG.lineStyle(unlocked ? 2 : 1.5, borderCol, borderAlpha);
        boxG.strokeRect(x - bw / 2, y - bh / 2, bw, bh);
        this._gridContainer.add(boxG);

        // Much brighter text and larger font for clear visibility
        const numCol = unlocked ? '#ffffff' : '#aaccdd';
        const strokeCol = unlocked ? '#000000' : '#112233';
        const num = this.add.text(x, y - 8, '' + lvl, {
          fontFamily: 'Impact,Arial Black,sans-serif', fontSize: '24px',
          color: numCol, stroke: strokeCol, strokeThickness: 4
        }).setOrigin(0.5);
        this._gridContainer.add(num);

        if (stars > 0) {
          const starStr = '★'.repeat(stars) + '☆'.repeat(3 - stars);
          const sc = this.add.text(x, y + 13, starStr, {
            fontFamily: 'sans-serif', fontSize: '11px', color: '#ffdd44',
            stroke: '#000', strokeThickness: 2
          }).setOrigin(0.5);
          this._gridContainer.add(sc);
        }

        if (!unlocked) {
          const lk = this.add.text(x, y, '🔒', { fontSize: '18px' }).setOrigin(0.5).setAlpha(0.65);
          this._gridContainer.add(lk);
        }

        if (unlocked) {
          const zone = this.add.zone(x, y, bw, bh).setInteractive({ useHandCursor: true });
          zone.on('pointerover', () => {
            boxG.clear();
            boxG.fillStyle(theme.sky1, 1);
            boxG.fillRect(x - bw/2, y - bh/2, bw, bh);
            boxG.lineStyle(3, 0xffffff, 1);
            boxG.strokeRect(x - bw/2, y - bh/2, bw, bh);
            this._themeLbl.setText('Level ' + lvl + '  —  ' + theme.name);
            num.setScale(1.1);
          });
          zone.on('pointerout', () => {
            boxG.clear();
            boxG.fillStyle(theme.sky1, boxAlpha);
            boxG.fillRect(x - bw/2, y - bh/2, bw, bh);
            boxG.lineStyle(2, borderCol, borderAlpha);
            boxG.strokeRect(x - bw/2, y - bh/2, bw, bh);
            num.setScale(1.0);
          });
          zone.on('pointerdown', () => {
            this.cameras.main.fade(250, 0, 0, 0);
            this.time.delayedCall(270, () => this.scene.start('Play', { mode: 'level', level: lvl }));
          });
          this._gridContainer.add(zone);
        }
      }
    }

    const th = THEMES[this._page];
    this._themeLbl.setText('Theme: ' + th.name + '  (Levels ' + (this._page * 10 + 1) + '–' + (this._page * 10 + 10) + ')');
  }

  _buildNav() {
    this._navContainer.removeAll(true);

    const backTxt = this.add.text(30, H - 28, '← BACK', {
      fontFamily: 'Courier New,monospace', fontSize: '14px', color: '#4fffb0', stroke: '#000', strokeThickness: 2
    }).setInteractive({ useHandCursor: true });
    backTxt.on('pointerdown', () => {
      this.cameras.main.fade(250, 0, 0, 0);
      this.time.delayedCall(270, () => this.scene.start('Menu'));
    });
    this._navContainer.add(backTxt);

    for (let i = 0; i < 10; i++) {
      const dotX = W / 2 - 45 + i * 10, dotY = H - 26;
      const dot = this.add.circle(dotX, dotY, 4, i === this._page ? 0x4fffb0 : 0x556677)
        .setInteractive({ useHandCursor: true });
      dot.on('pointerdown', () => { this._page = i; this._buildGrid(); this._buildNav(); });
      this._navContainer.add(dot);
    }

    if (this._page > 0) {
      const prev = this.add.text(14, H / 2, '◀', {
        fontFamily: 'Impact', fontSize: '26px', color: '#4fffb0', stroke: '#000', strokeThickness: 3
      }).setOrigin(0, 0.5).setInteractive({ useHandCursor: true });
      prev.on('pointerdown', () => { this._page--; this._buildGrid(); this._buildNav(); });
      this._navContainer.add(prev);
    }
    if (this._page < 9) {
      const next = this.add.text(W - 14, H / 2, '▶', {
        fontFamily: 'Impact', fontSize: '26px', color: '#4fffb0', stroke: '#000', strokeThickness: 3
      }).setOrigin(1, 0.5).setInteractive({ useHandCursor: true });
      next.on('pointerdown', () => { this._page++; this._buildGrid(); this._buildNav(); });
      this._navContainer.add(next);
    }
  }
}
// ═══════════════════════════════════════════════════════════
//  PLAY SCENE
// ═══════════════════════════════════════════════════════════
class PlayScene extends Phaser.Scene {
  constructor() { super({ key: 'Play' }); }

  init(data) {
    this._mode   = data.mode  || 'endless';
    this._lvlNum = data.level || 1;
  }

  create() {
    Store.incRuns();
    this._cfg       = getLevelConfig(this._mode === 'level' ? this._lvlNum : 1);
    this._alive     = true;
    this._lvlDone   = false;
    this._score     = 0;
    this._coins     = 0;
    this._combo     = 0;
    this._maxCombo  = 0;
    this._shieldHP  = 3;
    this._shieldInv = false;
    this._slow      = 1.0;
    this._diff      = this._cfg.diff;
    this._ptrX      = W / 2;
    this._ptrY      = H - 220;
    this._shVX      = 0;
    this._shVY      = 0;

    this._buildBg();
    this._buildEntities();
    this._pickupGroup = this.physics.add.group({ allowGravity: false });
    this._coinGroup   = this.physics.add.group({ allowGravity: false });
    this._buildCollisions();
    this._buildParticles();
    this._buildHUD();
    this._setupInput();
    this._wave = new WaveController(this);

    if (Store.getRuns() <= 2) this._tutorial();
    this.cameras.main.fadeIn(450);
  }

  update(time, delta) {
    if (!this._alive || this._lvlDone) return;
    const dt = delta * this._slow;

    this._score += dt * 0.005 * this._diff;
    const alt = Math.floor(this._score);

    if (this._mode === 'endless') {
      this._diff = 1.0 + Math.floor(this._score / 350) * 0.08;
    }

    this._scrollBg(dt);
    this._moveShield(dt);
    this._wave.update(time, dt, this._diff, this._score, this._cfg);
    this._hud.update(alt, this._coins, this._combo, this._shieldHP, this._diff,
                     this._mode, this._lvlNum,
                     this._mode === 'level' ? this._cfg.targetAlt : 0);

    if (this._mode === 'level' && alt >= this._cfg.targetAlt) {
      this._lvlDone = true;
      this._wave.stop();
      this.time.delayedCall(350, () => this._finishLevel());
    }
  }

  // ── BACKGROUND ─────────────────────────────────────────────
  _buildBg() {
    const th = this._cfg.theme;
    const bg = this.add.graphics();
    bg.fillStyle(th.sky1, 1); bg.fillRect(0, 0, W, H / 2);
    bg.fillStyle(th.sky2, 1); bg.fillRect(0, H / 2, W, H / 2);

    this._obstacles = this.physics.add.group({ allowGravity: false });

    this._stars = [];
    for (let i = 0; i < 160; i++) {
      const s = this.add.image(
        Phaser.Math.Between(0, W), Phaser.Math.Between(-H, H), 'star'
      ).setAlpha(Math.random() * th.stars).setScale(Math.random() * 2 + 0.5);
      this._stars.push({ s, sp: Phaser.Math.FloatBetween(0.02, 0.12) });
    }

    this._clouds = [];
    if (th.clouds > 0) {
      for (let i = 0; i < 14; i++) {
        const layer = Math.floor(i / 5);
        const speeds = [0.05, 0.12, 0.22];
        const c = this.add.image(
          Phaser.Math.Between(-20, W + 20), Phaser.Math.Between(-H, H), 'cloud'
        ).setAlpha(th.clouds * (1 - layer * 0.3)).setScale(th.cloudScale * (1 - layer * 0.2));
        this._clouds.push({ s: c, sp: speeds[layer] || 0.1 });
      }
    }
  }

  _scrollBg(dt) {
    const spd = dt * 0.26 * this._diff;
    this._stars.forEach(d => {
      d.s.y += spd * d.sp;
      if (d.s.y > H + 8) { d.s.y = -8; d.s.x = Phaser.Math.Between(0, W); }
    });
    this._clouds.forEach(d => {
      d.s.y += spd * d.sp;
      if (d.s.y > H + 80) { d.s.y = -100; d.s.x = Phaser.Math.Between(-20, W + 20); }
    });
  }

  // ── ENTITIES ────────────────────────────────────────────────
  _buildEntities() {
    const bx = W / 2, by = H - 150;

    this._balloon = this.physics.add.sprite(bx, by, 'balloon');
    this._balloon.setCircle(24, 6, 4);
    this._balloon.body.setAllowGravity(false);
    this._balloon.body.immovable = true;
    this._balloon.setDepth(12);
    this.tweens.add({ targets: this._balloon, y: by + 8, yoyo: true, repeat: -1, duration: 1300, ease: 'Sine.easeInOut' });

    this._shield = this.physics.add.image(bx, by - 75, 'shield');
    this._shield.setCircle(18, 2, 2);
    this._shield.body.setAllowGravity(false);
    this._shield.setDepth(22);
    this._updateShieldTint();
    this.tweens.add({ targets: this._shield, alpha: 0.72, yoyo: true, repeat: -1, duration: 1100, ease: 'Sine.easeInOut' });
  }

  _moveShield(dt) {
    const t  = 1 - Math.pow(0.004, dt / 1000);
    const px = this._shield.x, py = this._shield.y;
    const nx = Phaser.Math.Clamp(Phaser.Math.Linear(px, this._ptrX, t), 40, W - 40);
    const ny = Phaser.Math.Clamp(Phaser.Math.Linear(py, this._ptrY, t), 40, H - 40);
    this._shield.x = nx; this._shield.y = ny;
    this._shield.body.reset(nx, ny);
    this._shVX = (nx - px) / (dt / 1000);
    this._shVY = (ny - py) / (dt / 1000);
    this._shield.angle += this._shVX * 0.05;
  }

  _updateShieldTint() {
    const tints = [0xff0000, 0xff6600, 0xffcc00, 0x4fffb0];
    this._shield.setTint(tints[Phaser.Math.Clamp(this._shieldHP, 0, 3)]);
  }

  _damageShield(n) {
    if (this._shieldInv) return;
    this._shieldHP = Math.max(0, this._shieldHP - n);
    this._updateShieldTint();
    this._hud.shieldFlash();
    if (this._shieldHP <= 0) {
      this._shieldInv = true;
      this._shield.setAlpha(0.25);
      this.cameras.main.shake(280, 0.014);
      this._hud.showMsg('⚠ SHIELD CRACKED!', 0xff3355);
      this.time.delayedCall(1600, () => {
        this._shieldHP = 1; this._shieldInv = false;
        this._updateShieldTint(); this._shield.setAlpha(1);
      });
    }
  }

  // ── COLLISIONS ──────────────────────────────────────────────
  _buildCollisions() {
    this.physics.add.overlap(this._shield,   this._obstacles, this._hitShield,  null, this);
    this.physics.add.overlap(this._balloon,  this._obstacles, this._hitBalloon, null, this);
    this.physics.add.overlap(this._shield,   this._pickupGroup, this._hitPickup, null, this);
    this.physics.add.overlap(this._balloon,  this._pickupGroup, this._hitPickup, null, this);
    this.physics.add.overlap(this._shield,   this._coinGroup, this._hitCoin, null, this);
    this.physics.add.overlap(this._balloon,  this._coinGroup, this._hitCoin, null, this);
  }

  _hitShield(sh, obs) {
    if (!obs.active) return;
    const dx = obs.x - sh.x, dy = obs.y - sh.y;
    const len = Math.sqrt(dx * dx + dy * dy) || 1;
    const spd = Math.sqrt(this._shVX * this._shVX + this._shVY * this._shVY);
    const force = (380 + spd * 0.6) * this._diff;
    obs.setVelocity(
      (dx / len) * force + this._shVX * 0.4,
      (dy / len) * force + this._shVY * 0.4
    );
    const mass = obs.getData('mass') || 1;
    this._sparks(sh.x + (dx / len) * 34, sh.y + (dy / len) * 34, mass);
    if (mass >= 2) {
      this.cameras.main.shake(90 * mass, 0.005 * mass);
      if (!this._shieldInv) this._damageShield(1);
    } else {
      this.cameras.main.shake(55, 0.002);
    }
    obs.setData('deflected', true);
    this.time.delayedCall(280, () => { if (obs?.active) obs.setData('deflected', false); });
    this._addCombo();
  }

  _hitBalloon(balloon, obs) {
    if (!this._alive || obs.getData('deflected')) return;
    this._alive = false;
    this._die();
  }

  _hitPickup(obj, pu) {
    if (!pu.active) return;
    const type = pu.getData('type');
    pu.destroy();
    this._glitter(pu.x, pu.y, 0xffaa00);
    if (type === 'shield') { this._shieldHP = Math.min(3, this._shieldHP + 2); this._updateShieldTint(); this._hud.showMsg('🛡 SHIELD RESTORED!', 0x4fffb0); }
    if (type === 'slow')   { this._slow = 0.32; this.time.delayedCall(5500, () => { this._slow = 1.0; }); this._hud.showMsg('⏱ SLOW-MO!', 0x44aaff); }
    if (type === 'ghost')  { this._shieldInv = true; this._shield.setTint(0x88ffff); this.time.delayedCall(4000, () => { this._shieldInv = false; this._updateShieldTint(); }); this._hud.showMsg('👻 GHOST!', 0xff66ff); }
  }

  _hitCoin(obj, c) {
    if (!c.active) return;
    c.destroy();
    this._coins++;
    this._addCombo();
    this._glitter(c.x, c.y, 0xffcc00);
  }

  // ── COMBO ────────────────────────────────────────────────────
  _addCombo() {
    this._combo++;
    if (this._combo > this._maxCombo) this._maxCombo = this._combo;
    if (this._comboTimer) this._comboTimer.remove();
    this._comboTimer = this.time.delayedCall(2000, () => { this._combo = 0; this._hud.clearCombo(); });
    this._hud.showCombo(this._combo);
    if (this._combo % 5 === 0) {
      const bonus = this._combo * 2;
      this._score += bonus;
      this._hud.showMsg('COMBO ×' + this._combo + '! +' + bonus + 'm', 0xffdd44);
    }
  }

  // ── SPAWN (called by WaveController) ───────────────────────
  spawnPickup(x, y) {
    const types = ['shield', 'slow', 'ghost'];
    const type  = Phaser.Math.RND.pick(types);
    const keys  = { shield: 'pu_shield', slow: 'pu_slow', ghost: 'pu_ghost' };
    const pu = this.physics.add.image(x, y, keys[type]);
    pu.setData('type', type);
    pu.body.setAllowGravity(false);
    pu.setVelocityY(85); pu.setDepth(15);
    this._pickupGroup.add(pu);
    this.tweens.add({ targets: pu, angle: 360, repeat: -1, duration: 1100, ease: 'Linear' });
    this.tweens.add({ targets: pu, alpha: 0.6, scaleX: 1.15, scaleY: 1.15, yoyo: true, repeat: -1, duration: 550 });
    this.time.delayedCall(9000, () => { if (pu?.active) pu.destroy(); });
  }

  spawnCoin(x, y) {
    const c = this.physics.add.image(x, y, 'coin');
    c.body.setAllowGravity(false);
    c.setVelocityY(100 + Math.random() * 40);
    c.setVelocityX(Phaser.Math.Between(-35, 35));
    c.setDepth(14);
    this._coinGroup.add(c);
    this.time.delayedCall(7000, () => { if (c?.active) c.destroy(); });
  }

  // ── PARTICLES ────────────────────────────────────────────────
  _buildParticles() {
    this._streaks = this.add.particles(0, 0, 'streak', {
      x: { min: 0, max: W }, y: -4,
      speedY: { min: 250, max: 480 }, speedX: { min: -12, max: 12 },
      lifespan: { min: 450, max: 1100 },
      scale: { start: 1, end: 0 }, alpha: { start: 0.2, end: 0 },
      frequency: 50, quantity: 1, rotate: { min: -6, max: 6 },
      blendMode: Phaser.BlendModes.ADD,
    }).setDepth(28);
  }

  _sparks(x, y, mass) {
    const n = Math.floor(5 + mass * 5);
    const b = this.add.particles(x, y, 'spark', {
      speed: { min: 55, max: 200 + mass * 55 },
      scale: { start: 0.7 + mass * 0.25, end: 0 },
      alpha: { start: 1, end: 0 }, lifespan: 380 + mass * 90,
      quantity: n, blendMode: Phaser.BlendModes.ADD,
      tint: [0x4fffb0, 0xffffff, 0xaaffdd], emitting: false
    }).setDepth(26);
    b.explode(n, x, y);
    this.time.delayedCall(600, () => b.destroy());
  }

  _glitter(x, y, color) {
    const b = this.add.particles(x, y, 'glitter', {
      speed: { min: 40, max: 160 }, scale: { start: 1, end: 0 },
      alpha: { start: 1, end: 0 }, lifespan: 580, quantity: 14,
      blendMode: Phaser.BlendModes.ADD, tint: color, emitting: false
    }).setDepth(26);
    b.explode(14, x, y);
    this.time.delayedCall(750, () => b.destroy());
  }

  _pop(x, y) {
    const b = this.add.particles(x, y, 'spark', {
      speed: { min: 80, max: 360 }, scale: { start: 2, end: 0 },
      alpha: { start: 1, end: 0 }, lifespan: 850, quantity: 38,
      blendMode: Phaser.BlendModes.ADD,
      tint: [0xff2244, 0xff8899, 0xffccdd, 0xffffff], emitting: false
    }).setDepth(38);
    b.explode(38, x, y);
    this.time.delayedCall(1200, () => b.destroy());
  }

  // ── INPUT ────────────────────────────────────────────────────
  _setupInput() {
    this.input.on('pointermove', p => { this._ptrX = p.x; this._ptrY = p.y; });
    this.input.on('pointerdown', p => { this._ptrX = p.x; this._ptrY = p.y; });
  }

  // ── HUD ──────────────────────────────────────────────────────
  _buildHUD() { this._hud = new PlayHUD(this); }

  // ── TUTORIAL ─────────────────────────────────────────────────
  _tutorial() {
    const ov = this.add.graphics();
    ov.fillStyle(0x000000, 0.8); ov.fillRect(0, 0, W, H);
    ov.setDepth(100);
    const lines = [
      ['MOVE YOUR MOUSE / FINGER', '#4fffb0', '20px'],
      ['to control the green shield', '#aabbcc', '14px'],
      ['', '', ''],
      ['BLOCK obstacles from', '#ffffff', '15px'],
      ['hitting your balloon', '#ffffff', '15px'],
      ['', '', ''],
      ['Collect 🪙 coins & powerups', '#ffdd44', '14px'],
      ['', '', ''],
      ['TAP TO START!', '#4fffb0', '17px'],
    ];
    const txts = [];
    let y = 230;
    lines.forEach(([txt, col, sz]) => {
      if (txt) {
        txts.push(this.add.text(W / 2, y, txt, {
          fontFamily: 'Courier New,monospace', fontSize: sz,
          color: col, stroke: '#000', strokeThickness: 3
        }).setOrigin(0.5).setDepth(101));
      }
      y += sz ? parseInt(sz) + 9 : 10;
    });
    this.input.once('pointerdown', () => { ov.destroy(); txts.forEach(t => t.destroy()); });
  }

  // ── LEVEL COMPLETE ────────────────────────────────────────────
  _finishLevel() {
    const noShieldDmg = this._shieldHP === 3;
    const fast = this._score < this._cfg.targetAlt * 1.18;
    const stars = (noShieldDmg && fast) ? 3 : noShieldDmg ? 2 : 1;
    Store.saveLvlStars(this._lvlNum, stars);
    Store.saveMaxLvl(Math.min(MAX_LEVEL, this._lvlNum + 1));
    Store.addCoins(this._coins);
    this.cameras.main.fade(450, 0, 0, 0);
    this.time.delayedCall(470, () => {
      this.scene.start('LevelComplete', {
        level: this._lvlNum, stars,
        coins: this._coins, maxCombo: this._maxCombo,
        alt: Math.floor(this._score),
        hasNext: this._lvlNum < MAX_LEVEL,
      });
    });
  }

  // ── DEATH ─────────────────────────────────────────────────────
  _die() {
    this._pop(this._balloon.x, this._balloon.y);
    this._balloon.setVisible(false);
    this.cameras.main.shake(380, 0.016);
    this.cameras.main.flash(180, 255, 40, 70);
    const alt = Math.floor(this._score);
    const newRecord = Store.saveHS(alt);
    Store.addCoins(this._coins);
    this.time.delayedCall(1100, () => {
      this.cameras.main.fade(450, 0, 0, 0);
      this.time.delayedCall(470, () => {
        this.scene.start('GameOver', {
          mode: this._mode, level: this._lvlNum,
          score: alt, newRecord, highScore: Store.getHS(),
          coins: this._coins, maxCombo: this._maxCombo,
          theme: this._cfg.theme.name,
        });
      });
    });
  }

  get obstacleGroup() { return this._obstacles; }
}

// ═══════════════════════════════════════════════════════════
//  PLAY HUD
// ═══════════════════════════════════════════════════════════
class PlayHUD {
  constructor(scene) {
    this._scene = scene;
    const D = 60;
    const bold = (sz, col) => ({ fontFamily: 'Impact,Arial Black,sans-serif', fontSize: sz, color: col || '#ffffff', stroke: '#000', strokeThickness: 4 });
    const mono = (sz, col) => ({ fontFamily: 'Courier New,monospace', fontSize: sz, color: col || '#aabbcc', stroke: '#000', strokeThickness: 3 });

    // Mode badge
    const modeStr = scene._mode === 'level' ? 'LVL ' + scene._lvlNum : '∞ ENDLESS';
    const modeCol = scene._mode === 'level' ? '#4fffb0' : '#ffaa00';
    const mg = scene.add.graphics();
    mg.fillStyle(0x000000, 0.7); mg.fillRect(5, 5, 90, 26);
    mg.setScrollFactor(0).setDepth(D);
    scene.add.text(50, 18, modeStr, mono('13px', modeCol)).setOrigin(0.5).setScrollFactor(0).setDepth(D + 1);

    // Altitude
    scene.add.text(W / 2, 7, 'ALT', mono('10px', '#334455')).setOrigin(0.5, 0).setScrollFactor(0).setDepth(D);
    this._altTxt = scene.add.text(W / 2, 16, '0m', bold('34px')).setOrigin(0.5, 0).setScrollFactor(0).setDepth(D + 1);

    if (scene._mode === 'level') {
      const tgt = scene._cfg.targetAlt;
      scene.add.text(W / 2, 50, 'TARGET: ' + tgt + 'm', mono('11px', '#445566')).setOrigin(0.5, 0).setScrollFactor(0).setDepth(D);
      const barG = scene.add.graphics().setScrollFactor(0).setDepth(D);
      barG.fillStyle(0x111122, 1); barG.fillRect(W / 2 - 110, 63, 220, 5);
      this._progG = scene.add.graphics().setScrollFactor(0).setDepth(D + 1);
      this._progW = 0; this._targetAlt = tgt;
    }

    if (scene._mode === 'endless') {
      this._hsTxt = scene.add.text(W - 10, 7, 'BEST ' + Store.getHS() + 'm', mono('12px', '#445566')).setOrigin(1, 0).setScrollFactor(0).setDepth(D);
    }

    scene.add.image(W - 28, 32, 'coin').setScrollFactor(0).setDepth(D).setScale(0.85);
    this._coinTxt = scene.add.text(W - 42, 23, '0', bold('20px', '#ffdd44')).setOrigin(1, 0).setScrollFactor(0).setDepth(D + 1);

    scene.add.text(12, H - 37, 'SHIELD', mono('9px', '#336655')).setScrollFactor(0).setDepth(D);
    this._pips = [];
    for (let i = 0; i < 3; i++) {
      const pg = scene.add.graphics().setScrollFactor(0).setDepth(D + 1);
      this._pips.push(pg);
      this._drawPip(pg, 16 + i * 22, H - 22, true);
    }

    const rg = scene.add.graphics().setScrollFactor(0).setDepth(D);
    rg.fillStyle(0x111122, 0.8); rg.fillRect(W - 7, 0, 6, H);
    this._barG = scene.add.graphics().setScrollFactor(0).setDepth(D + 1);
    this._barH = 0;

    this._comboTxt = scene.add.text(W / 2, H - 64, '', bold('26px', '#ffdd44')).setOrigin(0.5).setAlpha(0).setScrollFactor(0).setDepth(D + 1);
    this._msgTxt = scene.add.text(W / 2, H / 2 - 40, '', bold('18px', '#4fffb0')).setOrigin(0.5).setAlpha(0).setScrollFactor(0).setDepth(D + 2);
    this._diffTxt = scene.add.text(W - 10, H - 10, '×1.0', mono('10px', '#1a2233')).setOrigin(1, 1).setScrollFactor(0).setDepth(D);
  }

  _drawPip(g, x, y, filled) {
    g.clear();
    g.fillStyle(filled ? 0x4fffb0 : 0x1a2233, 1);
    g.fillRect(x - 8, y - 4, 16, 8);
  }

  update(alt, coins, combo, shieldHP, diff, mode, lvlNum, targetAlt) {
    this._altTxt.setText(alt + 'm');
    this._coinTxt.setText('' + coins);
    this._diffTxt.setText('×' + diff.toFixed(1));

    for (let i = 0; i < 3; i++) this._drawPip(this._pips[i], 16 + i * 22, H - 22, i < shieldHP);

    const bh = H * Math.min(1, (alt % 600) / 600);
    if (bh !== this._barH) {
      this._barH = bh;
      this._barG.clear();
      this._barG.fillStyle(0x4fffb0, 1);
      this._barG.fillRect(W - 7, H - bh, 6, bh);
    }

    if (mode === 'level' && this._progG) {
      const pw = Math.min(220, (alt / targetAlt) * 220);
      if (pw !== this._progW) {
        this._progW = pw;
        this._progG.clear();
        this._progG.fillStyle(0x4fffb0, 1);
        this._progG.fillRect(W / 2 - 110, 63, pw, 5);
      }
    }

    if (mode === 'endless' && this._hsTxt && alt > Store.getHS()) {
      this._hsTxt.setText('BEST ' + alt + 'm').setColor('#ffdd44');
    }
  }

  showCombo(n) {
    if (n < 2) return;
    this._comboTxt.setText('×' + n + ' COMBO');
    this._scene.tweens.killTweensOf(this._comboTxt);
    this._comboTxt.setAlpha(1).setScale(1.2);
    this._scene.tweens.add({ targets: this._comboTxt, scaleX: 1, scaleY: 1, duration: 180 });
  }

  clearCombo() {
    this._scene.tweens.add({ targets: this._comboTxt, alpha: 0, duration: 350 });
  }

  showMsg(txt, color) {
    const hex = '#' + (color || 0x4fffb0).toString(16).padStart(6, '0');
    this._msgTxt.setText(txt).setColor(hex);
    this._scene.tweens.killTweensOf(this._msgTxt);
    this._msgTxt.setAlpha(1).setY(H / 2 - 40);
    this._scene.tweens.add({ targets: this._msgTxt, y: H / 2 - 85, alpha: 0, duration: 1700, ease: 'Power2' });
  }

  shieldFlash() {
    this._pips.forEach(p => this._scene.tweens.add({ targets: p, alpha: 0.15, yoyo: true, repeat: 2, duration: 90 }));
  }
}

// ═══════════════════════════════════════════════════════════
//  WAVE CONTROLLER
// ═══════════════════════════════════════════════════════════
class WaveController {
  constructor(scene) {
    this._sc  = scene;
    this._cd  = 1500;
    this._idx = 0;
    this._lps = 0;
    this._stopped = false;
    this._sincepu = 0;
    this._sincecoin = 0;
  }

  stop() { this._stopped = true; }

  update(time, dt, diff, score, cfg) {
    if (this._stopped) return;
    this._diff = diff; this._score = score; this._cfg = cfg;
    this._cd -= dt;
    if (this._cd > 0) return;

    const pats = cfg.patterns;
    const name = pats[this._idx % pats.length];
    this._idx++;
    if (this._idx > 0 && this._idx % pats.length === 0) this._lps++;

    this._spawn(name);

    const base = Math.max(700, 2500 - (diff - 1) * 700);
    this._cd = base * (0.88 + Math.random() * 0.24);

    this._sincepu++;
    if (this._sincepu >= Phaser.Math.Between(7, 10)) {
      this._sincepu = 0;
      this._sc.time.delayedCall(500, () => {
        if (this._sc._alive && !this._stopped)
          this._sc.spawnPickup(Phaser.Math.Between(50, W - 50), -20);
      });
    }

    this._sincecoin++;
    if (this._sincecoin >= Phaser.Math.Between(3, 4)) {
      this._sincecoin = 0;
      for (let i = 0; i < Phaser.Math.Between(2, 4); i++) {
        this._sc.time.delayedCall(i * 200, () => {
          if (this._sc._alive && !this._stopped)
            this._sc.spawnCoin(Phaser.Math.Between(40, W - 40), -18);
        });
      }
    }
  }

  _spawn(name) {
    const fn = this['_' + name];
    if (fn) fn.call(this); else this._fallingBlocks();
  }

  _vel()  { return (160 + this._diff * 90)  * (1 + this._lps * 0.15); }
  _dens() { return Math.min(8, this._cfg.density + Math.floor(this._lps * 0.4)); }

  _mkObs(x, y, key, mass) {
    const obs = this._sc.physics.add.image(x, y, key);
    obs.body.setAllowGravity(false);
    obs.setData('mass', mass || 1);
    obs.setDepth(6);
    const th = this._cfg.theme;
    
    const tmap = { 
        block: th.blockT, block_wide: th.blockT, wall: th.wallT, 
        triangle: th.triT, bar: th.barT, 
        circle: th.blockT, cross: th.triT, diamond: th.wallT 
    };
    if (tmap[key]) obs.setTint(tmap[key]);
    
    this._sc.obstacleGroup.add(obs);
    
    if (key === 'circle') obs.setCircle(18);

    this._autoDie(obs);
    return obs;
  }

  _autoDie(obs) {
    const t = this._sc.time.addEvent({ delay: 110, repeat: 90, callback: () => {
      if (!obs?.active) { t.remove(); return; }
      if (obs.y > H + 100 || obs.x < -110 || obs.x > W + 110) { obs.destroy(); t.remove(); }
    }});
  }

  _spin(obs, dur) {
    this._sc.tweens.add({ targets: obs, angle: 360, repeat: -1, duration: (dur || 800) / this._diff, ease: 'Linear' });
  }

  // ── PATTERNS ──────────────────────────────────────────────────
  _fallingBlocks() {
    const n = this._dens(), v = this._vel();
    const types = ['block', 'circle', 'cross', 'diamond'];
    for (let i = 0; i < n; i++) {
      this._sc.time.delayedCall(i * 175, () => {
        if (!this._sc._alive || this._stopped) return;
        const type = Phaser.Math.RND.pick(types);
        const b = this._mkObs(Phaser.Math.Between(28, W - 28), -28, type, 1.2);
        b.setVelocityY(v); b.setVelocityX(Phaser.Math.Between(-45, 45));
        if (type === 'cross' || type === 'diamond') this._spin(b, Phaser.Math.Between(1000, 2000));
      });
    }
  }

  _theTunnel() {
    const minGap = Math.max(110, 200 - (this._diff - 1) * 28);
    const gapCX  = Phaser.Math.Between(minGap / 2 + 44, W - minGap / 2 - 44);
    const v = this._vel() * 0.72;
    [gapCX - minGap / 2 - 22, gapCX + minGap / 2 + 22].forEach(x => {
      this._mkObs(x, -70, 'wall', 3).setVelocityY(v);
    });
    if (this._diff > 1.8) {
      this._sc.time.delayedCall(380, () => {
        if (!this._sc._alive || this._stopped) return;
        const b = this._mkObs(Phaser.Math.Between(gapCX - minGap / 2 + 30, gapCX + minGap / 2 - 30), -28, 'block', 1);
        b.setVelocityY(v * 1.1);
      });
    }
  }

  _theWall() {
    const bw = 50, v = this._vel() * 0.68;
    const count = Math.ceil(W / bw) + 2;
    const gapIdx = Phaser.Math.Between(1, count - 2);
    const blocks = [];
    for (let i = 0; i < count; i++) {
      if (i === gapIdx) continue;
      const b = this._mkObs(i * bw + bw / 2 - bw, -14, 'block_wide', 1);
      b.setVelocityY(v); blocks.push(b);
    }
    this._sc.tweens.add({ targets: blocks, x: '+=' + Phaser.Math.Between(-55, 55), yoyo: true, repeat: 2, duration: 700, ease: 'Sine.easeInOut' });
  }

  _thePendulum() {
    const ax = Phaser.Math.Between(90, W - 90), v = this._vel() * 0.52;
    const bar = this._mkObs(ax, -10, 'bar', 2);
    bar.setVelocityY(v);
    this._sc.tweens.add({
      targets: bar,
      angle: { from: Phaser.Math.Between(-52, -40), to: Phaser.Math.Between(40, 52) },
      yoyo: true, repeat: 5, duration: Math.max(380, 680 / this._diff), ease: 'Sine.easeInOut',
      onComplete: () => { if (bar?.active) bar.destroy(); }
    });
  }

  _theShredder() {
    [{ x: W * 0.25, y: -50 }, { x: W / 2, y: -80 }, { x: W * 0.75, y: -50 }].forEach(({ x, y }, i) => {
      this._sc.time.delayedCall(i * 110, () => {
        if (!this._sc._alive || this._stopped) return;
        const t = this._mkObs(x, y, 'triangle', 1.5);
        t.setVelocityY(this._vel() * 0.88); this._spin(t, 700);
      });
    });
  }

  _spikeDrop() {
    const x = Phaser.Math.Between(60, W - 60);
    const n = Math.min(6, 3 + Math.floor(this._diff));
    for (let i = 0; i < n; i++) {
      this._sc.time.delayedCall(i * 135, () => {
        if (!this._sc._alive || this._stopped) return;
        const s = this._mkObs(x + Phaser.Math.Between(-18, 18), -18, 'spike', 1.2);
        s.setVelocityY(this._vel() * 1.1); s.setVelocityX(Phaser.Math.Between(-28, 28));
      });
    }
  }

  _spikeRain() {
    const n = Math.min(10, 4 + Math.floor(this._diff * 1.4));
    for (let i = 0; i < n; i++) {
      this._sc.time.delayedCall(i * 110, () => {
        if (!this._sc._alive || this._stopped) return;
        const s = this._mkObs(Phaser.Math.Between(18, W - 18), -18, 'spike', 1);
        s.setVelocityY(this._vel() * 0.92); s.setAngle(Phaser.Math.Between(-18, 18));
      });
    }
  }

  _theGauntlet() {
    this._theTunnel();
    this._sc.time.delayedCall(650, () => { if (!this._sc._alive || this._stopped) return; this._thePendulum(); });
    if (this._diff > 1.5) this._sc.time.delayedCall(280, () => { if (!this._sc._alive || this._stopped) return; this._spikeDrop(); });
  }

  _crossfire() {
    const v = this._vel() * 0.8;
    for (let i = 0; i < 3; i++) {
      this._sc.time.delayedCall(i * 220, () => {
        if (!this._sc._alive || this._stopped) return;
        const y = Phaser.Math.Between(80, H - 300);
        this._mkObs(-30, y, 'block', 1).setVelocityX(v);
        this._mkObs(W + 30, y, 'block', 1).setVelocityX(-v);
      });
    }
    this._sc.time.delayedCall(300, () => { if (!this._sc._alive || this._stopped) return; this._fallingBlocks(); });
  }

  _vortex() {
    const cx = W / 2, n = 6, r = 80;
    const types = ['triangle', 'diamond', 'cross'];
    const type = Phaser.Math.RND.pick(types); 
    for (let i = 0; i < n; i++) {
      const angle = Phaser.Math.DegToRad(i * (360 / n));
      const x = cx + Math.cos(angle) * r, y = -40 - i * 20;
      this._sc.time.delayedCall(i * 90, () => {
        if (!this._sc._alive || this._stopped) return;
        const t = this._mkObs(x, y, type, 1.5);
        t.setVelocityY(this._vel() * 0.8);
        t.setVelocityX(Math.cos(angle + Math.PI / 2) * 120);
        this._spin(t, 600);
      });
    }
  }

  _apocalypse() {
    this._theTunnel();
    this._sc.time.delayedCall(200, () => { if (!this._sc._alive || this._stopped) return; this._theShredder(); });
    this._sc.time.delayedCall(450, () => { if (!this._sc._alive || this._stopped) return; this._spikeRain(); });
    this._sc.time.delayedCall(700, () => { if (!this._sc._alive || this._stopped) return; this._thePendulum(); });
  }
}

      fontFamily: 'Impact,Arial Black,sans-serif', fontSize: '44px',

    }).setOrigin(0.5);

        color: '#' + th.light.toString(16).padStart(6, '0')

    });

    this.time.delayedCall(380, () => {

          fontFamily: 'sans-serif', fontSize: '46px',
          color: earned ? '#ffdd44' : '#223344'
        }).setOrigin(0.5).setScale(0);
        this.tweens.add({

        });
      }
    });

    this.time.delayedCall(650, () => {

        ['🪙  Coins',    '' + d.coins],
        ['⚡  Max Combo', '×' + d.maxCombo],

        const g = this.add.graphics();
        g.fillStyle(0x000000, 0.55); g.fillRect(cx - 150, y - 16, 300, 36);
        g.lineStyle(1, 0x4fffb0, 0.2); g.strokeRect(cx - 150, y - 16, 300, 36);
        this.add.text(cx - 130, y, lbl, { fontFamily: 'Courier New,monospace', fontSize: '14px', color: '#556677' }).setOrigin(0, 0.5);
        this.add.text(cx + 130, y, val, { fontFamily: 'Impact,Arial Black,sans-serif', fontSize: '18px', color: '#ffffff', stroke: '#000', strokeThickness: 3 }).setOrigin(1, 0.5);
      });
    });

    if (d.hasNext && d.level < MAX_LEVEL) {
      this.time.delayedCall(850, () => {
        const nCfg = getLevelConfig(d.level + 1);
        const nTh  = nCfg.theme;
        const y = 446;
        this.add.text(cx, y - 14, 'NEXT LEVEL', { fontFamily: 'Courier New,monospace', fontSize: '11px', color: '#334455' }).setOrigin(0.5);
        const ng = this.add.graphics();
        ng.fillStyle(nTh.sky1, 0.85); ng.fillRect(cx - 120, y, 240, 36);
        ng.lineStyle(1.5, nTh.light, 0.8); ng.strokeRect(cx - 120, y, 240, 36);
        this.add.text(cx - 60, y + 9, 'Level ' + (d.level + 1), { fontFamily: 'Impact,Arial Black,sans-serif', fontSize: '18px', color: '#ffffff', stroke: '#000', strokeThickness: 3 }).setOrigin(0.5);
        this.add.text(cx + 50, y + 9, nTh.name, { fontFamily: 'Courier New,monospace', fontSize: '12px', color: '#' + nTh.light.toString(16).padStart(6, '0') }).setOrigin(0.5);
      });
    }

    this.time.delayedCall(1050, () => this._buttons(d, cx));
    this.cameras.main.fadeIn(380);
  }

  _buttons(d, cx) {
    if (d.hasNext && d.level < MAX_LEVEL) {
      const btn = this.add.text(cx, 516, '[ NEXT LEVEL → ]', {
        fontFamily: 'Impact,Arial Black,sans-serif', fontSize: '30px',
        color: '#4fffb0', stroke: '#002211', strokeThickness: 5
      }).setOrigin(0.5).setInteractive({ useHandCursor: true });
      btn.on('pointerover', () => btn.setColor('#ffffff').setScale(1.04));
      btn.on('pointerout',  () => btn.setColor('#4fffb0').setScale(1));
      btn.on('pointerdown', () => {
        this.cameras.main.fade(260, 0, 0, 0);
        this.time.delayedCall(280, () => this.scene.start('Play', { mode: 'level', level: d.level + 1 }));
      });
    } else if (d.level >= MAX_LEVEL) {
      this.add.text(cx, 516, '🎉 ALL 100 LEVELS DONE! 🎉', {

        color: '#ffdd44', stroke: '#000', strokeThickness: 4
      }).setOrigin(0.5);
    }

    const replay = this.add.text(cx, 564, 'Replay Level', { fontFamily: 'Courier New,monospace', fontSize: '14px', color: '#445566' })
      .setOrigin(0.5).setInteractive({ useHandCursor: true });
    replay.on('pointerdown', () => {
      this.cameras.main.fade(250, 0, 0, 0);
      this.time.delayedCall(270, () => this.scene.start('Play', { mode: 'level', level: d.level }));
    });

    const sel = this.add.text(cx, 592, 'Level Select', { fontFamily: 'Courier New,monospace', fontSize: '13px', color: '#334455' })
      .setOrigin(0.5).setInteractive({ useHandCursor: true });
    sel.on('pointerdown', () => {
      this.cameras.main.fade(250, 0, 0, 0);
      this.time.delayedCall(270, () => this.scene.start('LevelSelect'));
    });
  }
}

    });

    const secLabel = d.mode === 'level' ? 'Level Select' : 'Main Menu';
    const sec = this.add.text(cx, 514, secLabel, { fontFamily: 'Courier New,monospace', fontSize: '16px', color: '#334455' })
      .setOrigin(0.5).setAlpha(0).setInteractive({ useHandCursor: true });
    this.tweens.add({ targets: sec, alpha: 1, duration: 480, delay: 150 });
    sec.on('pointerover', () => sec.setColor('#aabbcc'));
    sec.on('pointerout',  () => sec.setColor('#334455'));
    sec.on('pointerdown', () => {
      this.cameras.main.fade(260, 0, 0, 0);
      this.time.delayedCall(280, () => this.scene.start(d.mode === 'level' ? 'LevelSelect' : 'Menu'));
    });

    if (d.mode === 'level') {
      const menu = this.add.text(cx, 548, 'Main Menu', { fontFamily: 'Courier New,monospace', fontSize: '13px', color: '#223344' })
        .setOrigin(0.5).setInteractive({ useHandCursor: true });
      menu.on('pointerdown', () => {
        this.cameras.main.fade(260, 0, 0, 0);
        this.time.delayedCall(280, () => this.scene.start('Menu'));
      });
    }

    const share = this.add.text(cx, 588, '📋 Share Score', { fontFamily: 'Courier New,monospace', fontSize: '12px', color: '#2a3a44' })
      .setOrigin(0.5).setInteractive({ useHandCursor: true });
    share.on('pointerdown', () => {
      const txt = 'I reached ' + (d.score || 0) + 'm in Rise Up! 🎈 ' + (d.mode === 'level' ? 'Level ' + d.level : 'Endless Mode');
      navigator.clipboard?.writeText(txt).then(() => share.setText('✅ Copied!'));
    });
  }
}

// ═══════════════════════════════════════════════════════════
//  LAUNCH
// ═══════════════════════════════════════════════════════════
new Phaser.Game({
  type: Phaser.AUTO,
  width: W, height: H,
  backgroundColor: '#06060f',
  parent: document.body,
  physics: { default: 'arcade', arcade: { gravity: { y: 0 }, fps: 120, overlapBias: 64, debug: false } },
  scale: { mode: Phaser.Scale.FIT, autoCenter: Phaser.Scale.CENTER_BOTH },
  scene: [BootScene, MenuScene, LevelSelectScene, PlayScene, LevelCompleteScene, GameOverScene],
});
</script>
